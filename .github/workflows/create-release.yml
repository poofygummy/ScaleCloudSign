name: Build AltSign

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.4'

      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Checkout scalecloud-ios (for ScaleCloudKit prebuilt)
        uses: actions/checkout@v4
        with:
          repository: poofygummy/scalecloud-ios
          path: scalecloud-ios
          sparse-checkout: ScaleCloudKit/prebuilt
          sparse-checkout-cone-mode: false

      - name: Cache iOS platform SDK
        id: cache-ios-sdk
        uses: actions/cache@v4
        with:
          path: /Applications/Xcode_15.4.app/Contents/Developer/Platforms/iPhoneOS.platform
          key: ios-sdk-xcode-15.4

      - name: Install iOS platform SDK
        if: steps.cache-ios-sdk.outputs.cache-hit != 'true'
        run: |
          sudo xcodebuild -downloadPlatform iOS

      - name: Remove invalid OpenSSL signature
        run: |
          find Dependencies/OpenSSL.xcframework -name '_CodeSignature' -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Build and extract framework
        run: |
          set -euo pipefail
          WS=${{ github.workspace }}
          mkdir -p prebuilt

          xcodebuild build \
            -scheme AltSign \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            FRAMEWORK_SEARCH_PATHS="$WS/Dependencies $WS/scalecloud-ios/ScaleCloudKit/prebuilt"

          FW=$(find build/Build/Products -type d -name "AltSign.framework" | head -1)
          if [ -z "$FW" ]; then
            echo "ERROR: AltSign.framework not found in build products"
            find build -name "*.framework" -o -name "*.a"
            exit 1
          fi
          echo "Found framework at: $FW"
          cp -R "$FW" prebuilt/

      - name: Upload prebuilt
        uses: actions/upload-artifact@v4
        with:
          name: AltSign-prebuilt
          path: prebuilt/
          retention-days: 7
