name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_xcframework:
    name: Build XCFramework
    runs-on: macos-latest
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Cache swift-create-xcframework
        uses: actions/cache@v4
        with:
          path: /opt/homebrew/Cellar/swift-create-xcframework
          key: swift-create-xcframework-2.4.0

      - name: Install swift-create-xcframework
        run: |
          brew install segment-integrations/formulae/swift-create-xcframework 2>/dev/null || true
          brew link --overwrite segment-integrations/formulae/swift-create-xcframework

      - name: Build XCFramework
        run: swift create-xcframework --zip --platform ios

      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: AltSign-xcframework
          path: "*.zip"
          retention-days: 7
          if-no-files-found: error
