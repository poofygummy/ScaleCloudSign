name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_xcframework:
    name: Build XCFramework
    runs-on: macos-latest
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Write xcconfig
        run: |
          echo 'FRAMEWORK_SEARCH_PATHS = $(inherited) ${{ github.workspace }}/Dependencies' > /tmp/altsign.xcconfig

      - name: Install swift-create-xcframework
        run: |
          gh release download 2.3.0 --repo unsignedapps/swift-create-xcframework --pattern "swift-create-xcframework*" --output /tmp/
          unzip -o /tmp/swift-create-xcframework*.zip -d /tmp/scx
          cp /tmp/scx/swift-create-xcframework /usr/local/bin/
          chmod +x /usr/local/bin/swift-create-xcframework

      - name: Build XCFramework
        run: |
          swift create-xcframework \
            --zip \
            --platform ios \
            --xcodebuild-argument -xcconfig \
            --xcodebuild-argument /tmp/altsign.xcconfig \
            AltSign
        env:
          FRAMEWORK_SEARCH_PATHS: ${{ github.workspace }}/Dependencies

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: "*.zip"
          draft: false
          prerelease: false
          generate_release_notes: true
