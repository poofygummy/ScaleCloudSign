name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_xcframework:
    name: Build XCFramework
    runs-on: macos-latest
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: /tmp/DerivedData
          key: derived-data-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: derived-data-${{ runner.os }}-

      - name: List available schemes
        run: |
          xcodebuild -list -package-path .

      - name: Build XCFramework
        run: |
          set -euo pipefail
          WS=${{ github.workspace }}

          xcodebuild archive \
            -scheme AltSign-Dynamic \
            -destination "generic/platform=iOS" \
            -archivePath /tmp/AltSign-ios \
            -derivedDataPath /tmp/DerivedData \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            FRAMEWORK_SEARCH_PATHS="$(inherited) $WS/Dependencies"

          xcodebuild archive \
            -scheme AltSign-Dynamic \
            -destination "generic/platform=iOS Simulator" \
            -archivePath /tmp/AltSign-sim \
            -derivedDataPath /tmp/DerivedData \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            FRAMEWORK_SEARCH_PATHS="$(inherited) $WS/Dependencies"

          xcodebuild -create-xcframework \
            -archive /tmp/AltSign-ios.xcarchive -framework AltSign.framework \
            -archive /tmp/AltSign-sim.xcarchive -framework AltSign.framework \
            -output $WS/AltSign.xcframework

          zip -r AltSign.xcframework.zip AltSign.xcframework

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: "*.zip"
          draft: false
          prerelease: false
          generate_release_notes: true
