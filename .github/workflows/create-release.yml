name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_xcframework:
    name: Build XCFramework
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Checkout scalecloud-ios (for ScaleCloudKit prebuilt)
        uses: actions/checkout@v4
        with:
          repository: poofygummy/scalecloud-ios
          path: scalecloud-ios
          sparse-checkout: ScaleCloudKit/prebuilt
          sparse-checkout-cone-mode: false

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: /tmp/DerivedData
          key: derived-data-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: derived-data-${{ runner.os }}-

      - name: Remove invalid OpenSSL signature
        run: |
          find Dependencies/OpenSSL.xcframework -name '_CodeSignature' -type d -exec rm -rf {} + 2>/dev/null || true

      - name: Resolve package and list schemes
        run: |
          xcodebuild -resolvePackageDependencies -clonedSourcePackagesDirPath /tmp/DerivedData/SourcePackages
          xcodebuild -list -json || true

      - name: Build XCFramework
        run: |
          set -euo pipefail
          WS=${{ github.workspace }}
          mkdir -p prebuilt

          xcodebuild build \
            -scheme ScaleCloudSign \
            -destination 'generic/platform=iOS' \
            -derivedDataPath /tmp/DerivedData \
            -clonedSourcePackagesDirPath /tmp/DerivedData/SourcePackages \
            BUILD_LIBRARY_FOR_DISTRIBUTION=YES \
            FRAMEWORK_SEARCH_PATHS="$WS/Dependencies $WS/scalecloud-ios/ScaleCloudKit/prebuilt" \
            OTHER_SWIFT_FLAGS="-no-verify-emitted-module-interface"

          FW=$(find /tmp/DerivedData/Build/Products -type d -name "ScaleCloudSign.framework" | head -1)
          if [ -z "$FW" ]; then
            echo "ERROR: ScaleCloudSign.framework not found in build products"
            find /tmp/DerivedData/Build/Products -name "*.framework" -o -name "*.a"
            exit 1
          fi
          echo "Found framework at: $FW"
          cp -R "$FW" prebuilt/

          # Assemble Modules/ from DerivedData — SPM doesn't put them inside the .framework
          mkdir -p prebuilt/ScaleCloudSign.framework/Modules/ScaleCloudSign.swiftmodule
          find /tmp/DerivedData/Build/Intermediates.noindex -name "ScaleCloudSign.swiftmodule" -type d | head -1 | xargs -I{} cp -R {}/ prebuilt/ScaleCloudSign.framework/Modules/ScaleCloudSign.swiftmodule/ 2>/dev/null || true
          find /tmp/DerivedData/Build/Products -name "*.swiftmodule" -o -name "*.swiftdoc" -o -name "*.swiftinterface" -o -name "*.abi.json" | grep ScaleCloudSign | while read f; do
            cp "$f" prebuilt/ScaleCloudSign.framework/Modules/ScaleCloudSign.swiftmodule/ 2>/dev/null || true
          done

          # Copy public headers from source tree into Headers/
          mkdir -p prebuilt/ScaleCloudSign.framework/Headers
          cp ScaleCloudSign/include/ScaleCloudSign.h prebuilt/ScaleCloudSign.framework/Headers/
          cp ScaleCloudSign/include/ScaleCloudSign/*.h prebuilt/ScaleCloudSign.framework/Headers/

          # Write module.modulemap
          cat > prebuilt/ScaleCloudSign.framework/Modules/module.modulemap << 'MODULEMAP'
          framework module ScaleCloudSign {
            umbrella header "ScaleCloudSign.h"
            export *
            module * { export * }
          }
          MODULEMAP

          echo "=== Final framework contents ==="
          find prebuilt/ScaleCloudSign.framework -type f | sort

      - name: Upload prebuilt
        uses: actions/upload-artifact@v4
        with:
          name: ScaleCloudSign-prebuilt
          path: prebuilt/
          retention-days: 7
